name: CI

on:
  push:
    branches: [main, java25-springboot4-migration]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Verify Docker (required for Testcontainers)
        run: docker version

      - name: Install postgresql-client-17 (required for backup integration tests)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          CODENAME=$(lsb_release -cs)
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-17
          pg_dump --version

      - name: Install tesseract for OCR integration tests
        run: |
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-deu tesseract-ocr-eng
          tesseract --version

      - name: Run tests with coverage (unit + integration)
        working-directory: java-server
        run: mvn -B -ntp verify

      - name: Publish test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: "java-server/target/{surefire,failsafe}-reports/TEST-*.xml"
          check_name: Java test results

      - name: Upload coverage to Codecov
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          files: java-server/target/site/jacoco/jacoco.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: knowledge-ui

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: knowledge-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (vue-tsc type gate + vite build)
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: knowledge-ui/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
