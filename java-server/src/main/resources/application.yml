spring:
  application:
    name: hivemem-java
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${HIVEMEM_JDBC_URL}
    username: ${HIVEMEM_DB_USER}
    password: ${HIVEMEM_DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jooq:
    sql-dialect: POSTGRES

hivemem:
  embedding:
    base-url: ${HIVEMEM_EMBEDDING_URL:http://localhost:8081}
    timeout: ${HIVEMEM_EMBEDDING_TIMEOUT:PT5S}
  popularity:
    refresh-interval: ${HIVEMEM_POPULARITY_REFRESH_INTERVAL:PT1H}
  search:
    weights:
      semantic: 0.30
      keyword: 0.15
      recency: 0.15
      importance: 0.15
      popularity: 0.15
      graph-proximity: 0.10
    confidence:
      high: 0.80
      medium: 0.65
      low: 0.55
  hooks:
    enabled: true
    relevance-threshold: ${HIVEMEM_HOOKS_RELEVANCE_THRESHOLD:0.65}
    max-cells: 3
    dedup-window-turns: 5
  attachment:
    enabled: ${HIVEMEM_ATTACHMENT_ENABLED:false}
    s3-endpoint: ${SEAWEEDFS_S3_ENDPOINT:http://localhost:8333}
    s3-bucket: ${SEAWEEDFS_S3_BUCKET:hivemem-attachments}
    s3-access-key: ${SEAWEEDFS_S3_ACCESS_KEY:hivemem}
    s3-secret-key: ${SEAWEEDFS_S3_SECRET_KEY:hivemem_secret}
    kroki-url: ${HIVEMEM_KROKI_URL:}
    kroki-timeout-seconds: ${HIVEMEM_KROKI_TIMEOUT_SECONDS:10}
    kroki-backfill-interval: ${HIVEMEM_KROKI_BACKFILL_INTERVAL:PT1H}
    vistierie-base-url: ${HIVEMEM_VISTIERIE_BASE_URL:http://vistierie:8090}
    vistierie-token: ${HIVEMEM_VISTIERIE_TOKEN:}
    vision-timeout-seconds: ${HIVEMEM_VISION_TIMEOUT_SECONDS:30}
  backup:
    pg-dump-path: ${HIVEMEM_PG_DUMP_PATH:pg_dump}
    psql-path: ${HIVEMEM_PSQL_PATH:psql}
    temp-dir: ${HIVEMEM_BACKUP_TEMP_DIR:${java.io.tmpdir}/hivemem-backup}
    export-dir: ${HIVEMEM_BACKUP_EXPORT_DIR:/var/lib/hivemem/exports}
    export-retention-count: ${HIVEMEM_BACKUP_EXPORT_RETENTION:5}
  summarize:
    enabled: ${HIVEMEM_SUMMARIZE_ENABLED:false}
    vistierie-base-url: ${HIVEMEM_VISTIERIE_BASE_URL:http://vistierie:8090}
    vistierie-token: ${HIVEMEM_VISTIERIE_TOKEN:}
    model: ${HIVEMEM_SUMMARIZE_MODEL:claude-haiku-4-5}
    daily-budget-usd: ${HIVEMEM_SUMMARIZE_DAILY_BUDGET:1.00}
    backfill-interval: ${HIVEMEM_SUMMARIZE_BACKFILL_INTERVAL:PT5M}
    backfill-batch-size: ${HIVEMEM_SUMMARIZE_BATCH:10}
    call-timeout-seconds: ${HIVEMEM_SUMMARIZE_TIMEOUT:30}
    max-input-chars: ${HIVEMEM_SUMMARIZE_MAX_INPUT:8000}
    summary-threshold-chars: ${HIVEMEM_SUMMARIZE_THRESHOLD:500}
  ocr:
    enabled: ${HIVEMEM_OCR_ENABLED:false}
    tesseract-path: ${HIVEMEM_TESSERACT_PATH:tesseract}
    languages: ${HIVEMEM_OCR_LANGUAGES:deu+eng}
    scan-detection-threshold: ${HIVEMEM_OCR_SCAN_THRESHOLD:50}
    render-dpi: ${HIVEMEM_OCR_DPI:300}
    call-timeout-seconds: ${HIVEMEM_OCR_TIMEOUT:60}
    backfill-interval: ${HIVEMEM_OCR_BACKFILL_INTERVAL:PT1H}
    backfill-batch-size: ${HIVEMEM_OCR_BATCH:5}
    max-pages: ${HIVEMEM_OCR_MAX_PAGES:50}

server:
  port: ${SERVER_PORT:8421}
  forward-headers-strategy: framework   # honor X-Forwarded-* from Cloudflare Tunnel / reverse proxies
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      location: ${java.io.tmpdir}
    session:
      timeout: 24h
      tracking-modes: cookie
      cookie:
        name: s
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: strict
