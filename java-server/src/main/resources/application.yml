spring:
  application:
    name: hivemem-java
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${HIVEMEM_JDBC_URL}
    username: ${HIVEMEM_DB_USER}
    password: ${HIVEMEM_DB_PASSWORD}
    hikari:
      # Sized for web traffic + the scheduled sweeps (summarize, OCR, embedding
      # backfill, sync pulls, consumption workers) that can hold connections
      # concurrently. Explicit timeouts so a saturated pool fails fast instead
      # of hanging callers.
      maximum-pool-size: ${HIVEMEM_DB_POOL_MAX:20}
      minimum-idle: ${HIVEMEM_DB_POOL_MIN_IDLE:5}
      connection-timeout: ${HIVEMEM_DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: 5000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jooq:
    sql-dialect: POSTGRES
  task:
    scheduling:
      pool:
        # More than one scheduler thread so a single long-running @Scheduled task (e.g. a
        # consumption poll running OCR inline under CallerRunsPolicy backpressure, or a slow
        # sync/summarize sweep) cannot starve every other scheduled job.
        size: 4

hivemem:
  language: ${HIVEMEM_LANGUAGE:de}
  security:
    # Production is reachable only through the Cloudflare Tunnel, so the TCP peer address
    # is loopback for every external request; rate limiting instead keys on the
    # tunnel-injected CF-Connecting-IP header. Set to false for deployments with no
    # trusted reverse proxy in front (e.g. direct LAN access), where it falls back to the
    # raw TCP peer address.
    trusted-proxy: ${HIVEMEM_TRUSTED_PROXY:true}
  oauth:
    enabled: ${HIVEMEM_OAUTH_ENABLED:false}
    issuer: ${HIVEMEM_OAUTH_ISSUER:}
  embedding:
    base-url: ${HIVEMEM_EMBEDDING_URL:http://localhost:8081}
    timeout: ${HIVEMEM_EMBEDDING_TIMEOUT:PT5S}
    cache-max-entries: ${HIVEMEM_EMBEDDING_CACHE_MAX_ENTRIES:500}
    cache-ttl: ${HIVEMEM_EMBEDDING_CACHE_TTL:PT10M}
  popularity:
    refresh-interval: ${HIVEMEM_POPULARITY_REFRESH_INTERVAL:PT1H}
  search:
    weights:
      semantic: 0.30
      keyword: 0.15
      recency: 0.15
      importance: 0.15
      popularity: 0.15
      graph-proximity: 0.10
    confidence:
      floor: 0.20
  hooks:
    enabled: true
    relevance-threshold: ${HIVEMEM_HOOKS_RELEVANCE_THRESHOLD:0.65}
    max-cells: 3
    dedup-window-turns: 5
  attachment:
    enabled: ${HIVEMEM_ATTACHMENT_ENABLED:false}
    s3-endpoint: ${SEAWEEDFS_S3_ENDPOINT:http://localhost:8333}
    s3-bucket: ${SEAWEEDFS_S3_BUCKET:hivemem-attachments}
    # No committed credential defaults — set both when attachments are enabled.
    s3-access-key: ${SEAWEEDFS_S3_ACCESS_KEY:}
    s3-secret-key: ${SEAWEEDFS_S3_SECRET_KEY:}
    kroki-url: ${HIVEMEM_KROKI_URL:}
    kroki-timeout-seconds: ${HIVEMEM_KROKI_TIMEOUT_SECONDS:10}
    kroki-backfill-interval: ${HIVEMEM_KROKI_BACKFILL_INTERVAL:PT1H}
    vistierie-base-url: ${HIVEMEM_VISTIERIE_BASE_URL:http://vistierie:8090}
    vistierie-token: ${HIVEMEM_VISTIERIE_TOKEN:}
    vision-timeout-seconds: ${HIVEMEM_VISION_TIMEOUT_SECONDS:30}
    vision-backfill-interval: ${HIVEMEM_VISION_BACKFILL_INTERVAL:PT1H}
  backup:
    pg-dump-path: ${HIVEMEM_PG_DUMP_PATH:pg_dump}
    psql-path: ${HIVEMEM_PSQL_PATH:psql}
    temp-dir: ${HIVEMEM_BACKUP_TEMP_DIR:${java.io.tmpdir}/hivemem-backup}
    export-dir: ${HIVEMEM_BACKUP_EXPORT_DIR:/var/lib/hivemem/exports}
    export-retention-count: ${HIVEMEM_BACKUP_EXPORT_RETENTION:5}
  summarize:
    enabled: ${HIVEMEM_SUMMARIZE_ENABLED:false}
    vistierie-base-url: ${HIVEMEM_VISTIERIE_BASE_URL:http://vistierie:8090}
    vistierie-token: ${HIVEMEM_VISTIERIE_TOKEN:}
    agent-name: ${HIVEMEM_SUMMARIZE_AGENT:document-separator}
    model: ${HIVEMEM_SUMMARIZE_MODEL:claude-haiku-4-5}
    language: ${HIVEMEM_SUMMARIZE_LANGUAGE:${HIVEMEM_LANGUAGE:de}}
    daily-budget-usd: ${HIVEMEM_SUMMARIZE_DAILY_BUDGET:1.00}
    backfill-interval: ${HIVEMEM_SUMMARIZE_BACKFILL_INTERVAL:PT5M}
    backfill-batch-size: ${HIVEMEM_SUMMARIZE_BATCH:10}
    call-timeout-seconds: ${HIVEMEM_SUMMARIZE_TIMEOUT:30}
    max-input-chars: ${HIVEMEM_SUMMARIZE_MAX_INPUT:8000}
    max-output-tokens: ${HIVEMEM_SUMMARIZE_MAX_OUTPUT:4096}
    summary-threshold-chars: ${HIVEMEM_SUMMARIZE_THRESHOLD:500}
  queen:
    enabled: ${HIVEMEM_QUEEN_ENABLED:false}
    vistierie-base-url: ${HIVEMEM_VISTIERIE_BASE_URL:http://vistierie:8090}
    vistierie-token: ${HIVEMEM_VISTIERIE_TOKEN:}
    hivemem-base-url: ${HIVEMEM_QUEEN_HIVEMEM_BASE_URL:http://hivemem:8421}
    webhook-token: ${HIVEMEM_QUEEN_WEBHOOK_TOKEN:}
    completion-webhook-token: ${HIVEMEM_QUEEN_COMPLETION_WEBHOOK_TOKEN:}
    schedule: ${HIVEMEM_QUEEN_SCHEDULE:0 0 3 * * *}
    isolated-batch-limit: ${HIVEMEM_QUEEN_ISOLATED_BATCH_LIMIT:20}
    call-timeout-seconds: ${HIVEMEM_QUEEN_CALL_TIMEOUT:30}
    separation-webhook-token: ${HIVEMEM_QUEEN_SEPARATION_WEBHOOK_TOKEN:}
    document-separator-agent: ${HIVEMEM_QUEEN_SEPARATOR_AGENT:document-separator}
    inbox-batch-limit: 20
    archivist-schedule: "0 0 4 * * *"
    archivist-debounce-seconds: 60
  ocr:
    enabled: ${HIVEMEM_OCR_ENABLED:false}
    tesseract-path: ${HIVEMEM_TESSERACT_PATH:tesseract}
    languages: ${HIVEMEM_OCR_LANGUAGES:deu+eng}
    scan-detection-threshold: ${HIVEMEM_OCR_SCAN_THRESHOLD:50}
    render-dpi: ${HIVEMEM_OCR_DPI:300}
    call-timeout-seconds: ${HIVEMEM_OCR_TIMEOUT:60}
    backfill-interval: ${HIVEMEM_OCR_BACKFILL_INTERVAL:PT1H}
    backfill-batch-size: ${HIVEMEM_OCR_BATCH:5}
    max-pages: ${HIVEMEM_OCR_MAX_PAGES:50}
  consumption:
    enabled: ${HIVEMEM_CONSUMPTION_ENABLED:false}
    dir: ${HIVEMEM_CONSUMPTION_DIR:/data/consumption}
    realm: ${HIVEMEM_CONSUMPTION_REALM:documents}
    poll-interval: ${HIVEMEM_CONSUMPTION_POLL_INTERVAL:PT10S}
    stable-seconds: ${HIVEMEM_CONSUMPTION_STABLE_SECONDS:5}
    max-pages: ${HIVEMEM_CONSUMPTION_MAX_PAGES:200}
    confidence-threshold: ${HIVEMEM_CONSUMPTION_CONFIDENCE:0.80}
    max-dispatch-retries: ${HIVEMEM_CONSUMPTION_MAX_RETRIES:3}
    reconcile-interval-ms: ${HIVEMEM_CONSUMPTION_RECONCILE_MS:300000}
    worker-threads: ${HIVEMEM_CONSUMPTION_WORKER_THREADS:2}
    reassembly-enabled: ${HIVEMEM_CONSUMPTION_REASSEMBLY_ENABLED:false}
    reassembly-confidence-threshold: ${HIVEMEM_CONSUMPTION_REASSEMBLY_CONFIDENCE:0.5}
    reassembly-render-dpi: ${HIVEMEM_CONSUMPTION_REASSEMBLY_DPI:150}
    reassembly-purpose: ${HIVEMEM_CONSUMPTION_REASSEMBLY_PURPOSE:separator}
    reassembly-max-tokens: ${HIVEMEM_CONSUMPTION_REASSEMBLY_MAX_TOKENS:4096}

server:
  port: ${SERVER_PORT:8421}
  forward-headers-strategy: framework   # honor X-Forwarded-* from Cloudflare Tunnel / reverse proxies
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
      location: ${java.io.tmpdir}
    session:
      timeout: 24h
      tracking-modes: cookie
      cookie:
        name: s
        http-only: true
        # Secure by default (HTTPS-only cookie). Override with
        # SESSION_COOKIE_SECURE=false for plain-HTTP local setups.
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict
