# Secrets (HIVEMEM_DB_PASSWORD, SEAWEEDFS_S3_ACCESS_KEY, SEAWEEDFS_S3_SECRET_KEY)
# have no committed defaults — set them in a .env file next to this compose file
# (gitignored) or in the environment. The SeaweedFS credentials must match
# seaweedfs/s3.json (create it from seaweedfs/s3.json.template).
#
# Resource limits are conservative single-host defaults — tune per host.
services:
  hivemem-db:
    image: pgvector/pgvector:pg17
    container_name: hivemem-db
    environment:
      POSTGRES_DB: hivemem
      POSTGRES_USER: hivemem
      POSTGRES_PASSWORD: ${HIVEMEM_DB_PASSWORD:?set HIVEMEM_DB_PASSWORD in .env}
    volumes:
      - hivemem-pgdata:/var/lib/postgresql/data
    networks:
      - hivemem-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemem -d hivemem"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 2g
    cpus: 2
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

  hivemem-embeddings:
    image: ghcr.io/visterion/hivemem-embeddings:main
    container_name: hivemem-embeddings
    volumes:
      - hivemem-embeddings-models:/app/models
    networks:
      - hivemem-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      # First boot downloads the model from Hugging Face — allow plenty of time.
      start_period: 300s
    mem_limit: 2g
    cpus: 2
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

  hivemem:
    image: ghcr.io/visterion/hivemem:main
    container_name: hivemem
    ports:
      - "8421:8421"
    environment:
      HIVEMEM_JDBC_URL: jdbc:postgresql://hivemem-db:5432/hivemem
      HIVEMEM_DB_USER: hivemem
      HIVEMEM_DB_PASSWORD: ${HIVEMEM_DB_PASSWORD:?set HIVEMEM_DB_PASSWORD in .env}
      HIVEMEM_EMBEDDING_URL: http://hivemem-embeddings:80
      HIVEMEM_ATTACHMENT_ENABLED: "true"
      SEAWEEDFS_S3_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_S3_BUCKET: hivemem-attachments
      SEAWEEDFS_S3_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY:?set SEAWEEDFS_S3_ACCESS_KEY in .env}
      SEAWEEDFS_S3_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY:?set SEAWEEDFS_S3_SECRET_KEY in .env}
      # Session cookie defaults to Secure (HTTPS-only). For plain-HTTP local
      # setups uncomment the override:
      # SESSION_COOKIE_SECURE: "false"
    depends_on:
      hivemem-db:
        condition: service_healthy
      hivemem-embeddings:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    networks:
      - hivemem-net
    mem_limit: 3g
    cpus: 2
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

  seaweedfs:
    image: chrislusf/seaweedfs:3.68
    command: >
      server
      -s3
      -s3.config=/etc/seaweedfs/s3.json
      -dir=/data
    volumes:
      - seaweedfs_data:/data
      # Create from seaweedfs/s3.json.template — the real file is gitignored.
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    # No published ports: only hivemem talks to the S3 API, over hivemem-net.
    # For ad-hoc host access use `docker exec` or a temporary `-p 8333:8333`.
    networks:
      - hivemem-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8333/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 1g
    cpus: 1
    restart: unless-stopped
    # Proxmox LXC: uncomment the next line
    # security_opt: [apparmor=unconfined]

networks:
  hivemem-net:

volumes:
  hivemem-pgdata:
  hivemem-embeddings-models:
  seaweedfs_data:
